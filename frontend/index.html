<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="GLAANZ - Experience the legacy of heritage Indian jewelry. Discover handcrafted Kundan, Polki, Victorian, and antique masterpieces designed for modern royalty.">
    <meta name="keywords"
        content="Indian jewelry, Kundan, Polki, heritage jewelry, bridal jewelry, antique earrings, Victorian jewelry, GLAANZ">
    <meta name="robots" content="index, follow">
    <title>GLAANZ | Heritage Indian Jewelry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #141210;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        h1,
        h2,
        h3,
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #141210;
        }

        ::-webkit-scrollbar-thumb {
            background: #292524;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #d4af37;
        }

        .gold-gradient {
            background: linear-gradient(135deg,
                    #8a6d3b 0%,
                    #e2c07d 20%,
                    #ffedb3 45%,
                    #e2c07d 70%,
                    #8a6d3b 100%);
            background-size: 200% auto;
            animation: shine-gold 5s linear infinite;
        }

        .silver-gradient {
            background: linear-gradient(135deg, #71717a 0%, #e4e4e7 25%, #ffffff 50%, #e4e4e7 75%, #71717a 100%);
            background-size: 200% auto;
            animation: shine-silver 6s ease-in-out infinite;
        }

        @keyframes shine-gold {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        @keyframes shine-silver {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 200% 50%;
            }
        }

        @keyframes fade-in-up {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fade-in-up 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .royal-gradient {
            background: linear-gradient(to right, #1a100a, #2d1b10);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .text-shimmer {
            background: linear-gradient(to right, #d4af37 20%, #ffffff 40%, #ffffff 60%, #d4af37 80%);
            background-size: 200% auto;
            background-clip: text;
            text-fill-color: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .foil-shadow {
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
        }

        /* SUPER SMOOTH FLY TO CART ANIMATION */
        @keyframes fly-to-cart {
            0% {
                transform: translate(var(--start-x), var(--start-y)) scale(1) rotate(0deg);
                opacity: 1;
                filter: brightness(1);
            }

            15% {
                transform: translate(calc(var(--start-x) - 20px), calc(var(--start-y) - 40px)) scale(1.1) rotate(-5deg);
                opacity: 1;
            }

            100% {
                transform: translate(var(--target-x), var(--target-y)) scale(0.15) rotate(720deg);
                opacity: 0.2;
                filter: brightness(1.5) blur(1px);
            }
        }

        .animate-fly-to-cart {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            pointer-events: none;
            animation: fly-to-cart 0.85s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            will-change: transform, opacity;
        }

        /* CART ICON ARRIVAL PING */
        @keyframes cart-pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.35);
                filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.8));
            }

            100% {
                transform: scale(1);
            }
        }

        .animate-cart-pop {
            animation: cart-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>

</script>

</head>

</html>
